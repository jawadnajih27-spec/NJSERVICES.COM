<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<title>لوحة تحكم NJSERVICES</title>

<style>

body{
background:#0a0a0a;
color:white;
font-family:Cairo;
padding:40px;
}

.panel{
max-width:900px;
margin:auto;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:none;
}

button{
padding:12px 30px;
background:#d4af37;
border:none;
border-radius:30px;
font-weight:bold;
cursor:pointer;
}

.orders{
margin-top:40px;
}

.order{
background:#1a1a1a;
padding:15px;
margin:10px 0;
border-radius:10px;
}

</style>

</head>

<body>

<div class="panel">

<h1>لوحة تحكم NJSERVICES</h1>

<h3>إعدادات الموقع</h3>

<input id="siteTitle" placeholder="عنوان الموقع">

<input id="heroTitle" placeholder="عنوان الصفحة الرئيسية">

<input id="heroText" placeholder="وصف الصفحة الرئيسية">

<input id="primaryColor" placeholder="اللون الرئيسي مثال #d4af37">

<input id="whatsapp" placeholder="رقم واتساب مثال 212600000000">

<h3>أسعار الخدمات</h3>

<input id="service1Price" placeholder="سعر الخدمة 1">

<input id="service2Price" placeholder="سعر الخدمة 2">

<input id="service3Price" placeholder="سعر الخدمة 3">

<input id="service4Price" placeholder="سعر الخدمة 4">

<button onclick="saveSettings()">حفظ التغييرات</button>


<div class="orders">

<h2>طلبات العملاء</h2>

<div id="ordersList"></div>

</div>

</div>


<script>

// ==========================
// حفظ الإعدادات
// ==========================

function saveSettings(){

const settings={

siteTitle:document.getElementById("siteTitle").value,

heroTitle:document.getElementById("heroTitle").value,

heroText:document.getElementById("heroText").value,

primaryColor:document.getElementById("primaryColor").value,

whatsapp:document.getElementById("whatsapp").value,

service1Price:document.getElementById("service1Price").value,

service2Price:document.getElementById("service2Price").value,

service3Price:document.getElementById("service3Price").value,

service4Price:document.getElementById("service4Price").value

}

localStorage.setItem("nj_site_settings",JSON.stringify(settings))

alert("تم حفظ التغييرات")

}


// ==========================
// عرض الطلبات
// ==========================

function loadOrders(){

const orders = JSON.parse(localStorage.getItem("nj_orders") || "[]")

const container=document.getElementById("ordersList")

container.innerHTML=""

orders.forEach(order=>{

container.innerHTML+=`

<div class="order">

رقم الطلب : ${order.id}<br>

الخدمة : ${order.service}<br>

التاريخ : ${order.date}<br>

الحالة : ${order.status}

</div>

`

})

}

loadOrders()

</script>

</body>
</html>
