<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NJ-Admin | لوحة التحكم</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-dark: #0a0906;
            --bg-panel: #141310;
            --gold: #c9a84c;
            --gold-hover: #e0be5c;
            --text-main: #fcfcfc;
            --text-muted: #888;
            --border: #2a2822;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
        }

        /* Login Screen */
        #login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            background-color: var(--bg-dark);
            z-index: 100;
        }

        .login-box {
            background: var(--bg-panel);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .login-box h1 {
            color: var(--gold);
            margin-bottom: 20px;
            font-size: 24px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: right;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 6px;
            outline: none;
            transition: all 0.3s;
        }

        input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 8px rgba(201, 168, 76, 0.2);
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--gold);
            color: var(--bg-dark);
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button:hover {
            background: var(--gold-hover);
        }

        /* Dashboard Layout */
        #dashboard {
            display: none;
            width: 100%;
        }

        .sidebar {
            width: 260px;
            background: var(--bg-panel);
            border-left: 1px solid var(--border);
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .logo {
            color: var(--gold);
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 40px;
            text-align: center;
            letter-spacing: 2px;
        }

        .nav-item {
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 6px;
            margin-bottom: 8px;
            transition: all 0.3s;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(201, 168, 76, 0.1);
            color: var(--gold);
        }

        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            position: relative;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: #2ecc71;
            border-radius: 50%;
            box-shadow: 0 0 10px #2ecc71;
        }

        .card {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 25px;
        }

        .card h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: var(--gold);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        /* Toast Notification */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: var(--gold);
            color: var(--bg-dark);
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
        }

        #toast.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h1>NJ-Admin</h1>
            <div class="input-group">
                <label>GitHub Token</label>
                <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxxxxxxx">
            </div>
            <div class="input-group">
                <label>اسم المستودع (مثال: username/repo)</label>
                <input type="text" id="gh-repo" placeholder="Jawad/GoldenNJ-Store">
            </div>
            <button onclick="authenticate()" id="btn-login">
                <i data-lucide="key"></i> دخول للوحة
            </button>
        </div>
    </div>

    <div id="dashboard">
        <div class="sidebar">
            <div class="logo">NJSERVICES</div>
            <div class="nav-item active"><i data-lucide="layout-dashboard"></i> الإعدادات العامة</div>
            <div class="nav-item"><i data-lucide="monitor"></i> قسم الواجهة (Hero)</div>
            <div class="nav-item"><i data-lucide="shopping-bag"></i> المنتجات</div>
            <div class="nav-item"><i data-lucide="share-2"></i> التواصل الاجتماعي</div>
            <div style="margin-top: auto;">
                <button onclick="logout()" style="background: transparent; color: #e74c3c; border: 1px solid #e74c3c;">
                    <i data-lucide="log-out"></i> خروج
                </button>
            </div>
        </div>

        <div class="main-content">
            <div class="header">
                <div>
                    <h2 style="color: var(--text-main);">إدارة المحتوى</h2>
                    <p style="color: var(--text-muted); font-size: 14px; margin-top: 5px;" id="repo-display"></p>
                </div>
                <div style="display: flex; gap: 15px; align-items: center;">
                    <div class="status">
                        <div class="status-dot"></div> متصل
                    </div>
                    <button onclick="saveChanges()" id="btn-save" style="width: auto; padding: 10px 25px;">
                        <i data-lucide="cloud-upload"></i> حفظ ونشر التعديلات
                    </button>
                </div>
            </div>

            <div class="card">
                <h2><i data-lucide="settings"></i> الإعدادات العامة</h2>
                <div class="grid-2">
                    <div class="input-group">
                        <label>اسم الموقع</label>
                        <input type="text" id="site_name">
                    </div>
                    <div class="input-group">
                        <label>العملة</label>
                        <input type="text" id="currency">
                    </div>
                </div>
            </div>

            <div class="card">
                <h2><i data-lucide="monitor"></i> قسم الواجهة (Hero Section)</h2>
                <div class="input-group">
                    <label>العنوان الرئيسي</label>
                    <input type="text" id="hero_headline">
                </div>
                <div class="input-group">
                    <label>الوصف الفرعي</label>
                    <input type="text" id="hero_subheadline">
                </div>
                <div class="input-group">
                    <label>نص الزر</label>
                    <input type="text" id="hero_button">
                </div>
            </div>

            <div class="card">
                <h2><i data-lucide="share-2"></i> الروابط</h2>
                <div class="grid-2">
                    <div class="input-group">
                        <label>رقم الواتساب</label>
                        <input type="text" id="link_whatsapp">
                    </div>
                    <div class="input-group">
                        <label>رابط إنستغرام</label>
                        <input type="text" id="link_instagram">
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div id="toast"><i data-lucide="check-circle"></i> <span id="toast-msg">تم الحفظ بنجاح</span></div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // State Management
        let appState = {
            token: localStorage.getItem('nj_token') || '',
            repo: localStorage.getItem('nj_repo') || '',
            fileSha: '',
            jsonData: null
        };

        const FILE_PATH = 'data.json';

        // Encoding helpers for Arabic UTF-8 Support
        function utf8_to_b64(str) {
            return window.btoa(unescape(encodeURIComponent(str)));
        }
        function b64_to_utf8(str) {
            return decodeURIComponent(escape(window.atob(str)));
        }

        // On Load Check
        window.onload = () => {
            if(appState.token && appState.repo) {
                document.getElementById('gh-token').value = appState.token;
                document.getElementById('gh-repo').value = appState.repo;
                authenticate(); // Auto login if exists
            }
        };

        // Authenticate & Fetch
        async function authenticate() {
            const tokenInput = document.getElementById('gh-token').value.trim();
            const repoInput = document.getElementById('gh-repo').value.trim();
            const btn = document.getElementById('btn-login');

            if(!tokenInput || !repoInput) return alert('الرجاء إدخال التوكن واسم المستودع');

            btn.innerHTML = '<i data-lucide="loader" class="spin"></i> جاري الاتصال...';
            lucide.createIcons();

            appState.token = tokenInput;
            appState.repo = repoInput;

            try {
                const response = await fetch(`https://api.github.com/repos/${appState.repo}/contents/${FILE_PATH}`, {
                    headers: {
                        'Authorization': `Bearer ${appState.token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                if(!response.ok) throw new Error('فشل الاتصال، تأكد من البيانات');

                const data = await response.json();
                appState.fileSha = data.sha;
                
                // Decode content
                const decodedContent = b64_to_utf8(data.content);
                appState.jsonData = JSON.parse(decodedContent);

                // Save credentials safely
                localStorage.setItem('nj_token', appState.token);
                localStorage.setItem('nj_repo', appState.repo);

                showDashboard();
                populateForm();

            } catch (error) {
                alert(error.message);
                btn.innerHTML = '<i data-lucide="key"></i> دخول للوحة';
                lucide.createIcons();
            }
        }

        // UI Transitions
        function showDashboard() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'flex';
            document.getElementById('repo-display').innerText = `المستودع المتصل: ${appState.repo}`;
        }

        function logout() {
            localStorage.removeItem('nj_token');
            localStorage.removeItem('nj_repo');
            location.reload();
        }

        // Populate Form with JSON Data
        function populateForm() {
            const data = appState.jsonData;
            if(!data) return;

            document.getElementById('site_name').value = data.global_settings.site_name;
            document.getElementById('currency').value = data.global_settings.currency;
            
            document.getElementById('hero_headline').value = data.hero_section.headline;
            document.getElementById('hero_subheadline').value = data.hero_section.subheadline;
            document.getElementById('hero_button').value = data.hero_section.button_text;

            document.getElementById('link_whatsapp').value = data.social_links.whatsapp;
            document.getElementById('link_instagram').value = data.social_links.instagram;
        }

        // Update JSON Object from Form
        function updateDataObject() {
            appState.jsonData.global_settings.site_name = document.getElementById('site_name').value;
            appState.jsonData.global_settings.currency = document.getElementById('currency').value;
            
            appState.jsonData.hero_section.headline = document.getElementById('hero_headline').value;
            appState.jsonData.hero_section.subheadline = document.getElementById('hero_subheadline').value;
            appState.jsonData.hero_section.button_text = document.getElementById('hero_button').value;

            appState.jsonData.social_links.whatsapp = document.getElementById('link_whatsapp').value;
            appState.jsonData.social_links.instagram = document.getElementById('link_instagram').value;
        }

        // Save & Commit to GitHub
        async function saveChanges() {
            const btn = document.getElementById('btn-save');
            btn.innerHTML = '<i data-lucide="loader"></i> جاري الرفع...';
            lucide.createIcons();

            updateDataObject();

            const newContentStr = JSON.stringify(appState.jsonData, null, 2);
            const base64Content = utf8_to_b64(newContentStr);

            const bodyData = {
                message: "Update website content via NJ-Admin ⚡",
                content: base64Content,
                sha: appState.fileSha
            };

            try {
                const response = await fetch(`https://api.github.com/repos/${appState.repo}/contents/${FILE_PATH}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${appState.token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(bodyData)
                });

                if(!response.ok) throw new Error('فشل التحديث');

                const result = await response.json();
                appState.fileSha = result.content.sha; // Update SHA for next commit

                showToast('تم تحديث الموقع بنجاح!');
                
            } catch (error) {
                alert('حدث خطأ أثناء الحفظ: ' + error.message);
            } finally {
                btn.innerHTML = '<i data-lucide="cloud-upload"></i> حفظ ونشر التعديلات';
                lucide.createIcons();
            }
        }

        // Toast Helper
        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
